<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dream Games | Official Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://googleapis.com" rel="stylesheet">
    <style>
	
        body {
            font-family: sans-serif;
            margin: 0;
            background-color: #ffffff;
        }

        /* Modern Navigation Bar */
        nav {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: #fff;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: black;
            flex-grow: 1;
        }

        .logo-section img {
            background: black;
            margin-right: 10px;
        }

        /* Dropdown Menu */
        .games-dropdown {
            position: relative;
            cursor: pointer;
        }

        .games-dropdown summary {
            list-style: none;
            outline: none;
        }

        .dropdown-content {
            position: absolute;
            right: 0;
            top: 100%;
            background: #f9f9f9;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 10px;
            width: 250px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .dropdown-content button {
            width: 100%;
            text-align: left;
            padding: 8px;
            cursor: pointer;
            font-family: 'Tahoma', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        video {
            width: 100%;
            max-height: 80vh;
            object-fit: cover;
        }

        footer {
            padding: 20px;
            border-top: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body style="background-image: url('1.png'); background-size: cover; background-attachment: fixed; background-repeat: no-repeat; height: 100vh; margin: 0;">
    <nav>
        <a href="dream games website.html" class="logo-section">
            <img src="dglogo.png" width="40" alt="Logo">
            <h1>DREAM GAMES</h1>
        </a>

        <!-- Home Button -->
        <a href="dream games website.html">
            <img src="homebtn.png" width="115" alt="Home">
        </a>

        <!-- Games Dropdown -->
        <details class="games-dropdown">
            <summary><img src="gamesbtn.png" width="150" alt="Games"></summary>
            <div class="dropdown-content">
                <a href="us26.html">
                    <button><img src="us26.jpg" width="25"> ULTIMATE SOCCER 2026</button>
                </a>
                <a href="us26mlg.html">
                    <button><img src="mlg.png" width="25"> ULTIMATE SOCCER 2026 MLG EDITION</button>
                </a>
            </div>
        </details>
    </nav>

    <video autoplay muted loop>
        <source src="home.mp4" type="video/mp4">
    </video>

    <footer>
        <font color="white" ><b>© 2026 Dream Games Official.</b></font>
        <a href="https://www.youtube.com/@DreamGames2025" target="_blank">
            <img src="download.png" width="40" alt="YouTube">
        </a>
    </footer>

</body>
</html>
